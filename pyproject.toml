[project]
name = "larrak2"
version = "0.1.0"
description = "Multi-objective Pareto optimization for thermo-gear systems"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "numpy>=1.24",
    "pymoo>=0.6",
    "pydantic>=2.0",
    "pyyaml>=6.0",
    "numpy-stl>=3.0",
    "torch>=2.0",
    "scikit-learn>=1.0",
    "larrak-core @ git+https://github.com/mhold3n/larrak-core.git@3fd949e4f41bd5c5f2a0e825fca2118fe301d235",
    "larrak-engines @ git+https://github.com/mhold3n/larrak-engines.git@3f7f342cbda410cdd334edfc4211a3637dddabc1",
    "larrak-simulation @ git+https://github.com/mhold3n/larrak-simulation.git@249230799636f2aa78a3b18b532432c9d6f2c28e",
    "larrak-optimization @ git+https://github.com/mhold3n/larrak-optimization.git@b21de537d4eb2f2c1d07af1e9772b6447ba59072",
    "larrak-analysis @ git+https://github.com/mhold3n/larrak-analysis.git@1c71aad7bcb336cdee7ba7f9f665a7089f0f3266",
    "larrak-orchestration @ git+https://github.com/mhold3n/larrak-orchestration.git@7a1efa4fdbf31c0f1acbb1bd31e3fe5404c07136",
]

[project.optional-dependencies]
dev = ["pytest>=7.0", "ruff>=0.1", "mypy>=1.0"]
combustion = ["cantera>=3.0"]
casadi = ["casadi>=3.6"]
deap = ["deap>=1.3"]
orchestration = ["redis>=5.0", "weaviate-client>=4.0"]

[project.scripts]
larrak-run = "larrak2.cli.run:main"
larrak-gen = "larrak2.cli.generate:main"
larrak-train = "larrak2.cli.train:main"
larrak-validate = "larrak2.cli:validate_main"
larrak-validate-sim = "larrak2.cli:validate_simulation_main"

[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.ruff]
line-length = 100
target-version = "py311"
exclude = []

[tool.ruff.lint]
select = ["E", "F", "I", "W", "UP"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true

[tool.pytest.ini_options]
testpaths = ["tests/ci_contract"]
norecursedirs = ["tests/dev"]
python_files = "test_*.py"
