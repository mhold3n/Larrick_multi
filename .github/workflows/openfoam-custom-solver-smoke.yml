# Optional Docker wmake smoke for larrakEngineFoam. Does not run on PRs by default.
name: OpenFOAM custom solver smoke

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docker-solver-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Configure Git for private LarrickCamPro dependencies
        env:
          PAT: ${{ secrets.LARRICKCAMPRO_GIT_READ_PAT }}
        run: |
          if [ -z "${PAT}" ]; then
            echo "::error::Missing repository secret LARRICKCAMPRO_GIT_READ_PAT (PAT with Contents: Read on private LarrickCamPro/larrak-* repos). Required for pip to clone pinned git dependencies."
            exit 1
          fi
          git config --global url."https://x-access-token:${PAT}@github.com/LarrickCamPro/".insteadOf "https://github.com/LarrickCamPro/"
      - name: Install project (minimal)
        run: |
          python -m pip install --upgrade pip
          bash scripts/install_external_larrak.sh
          pip install -e . --no-deps
      - name: ensure_custom_solver (refresh)
        run: |
          python - <<'PY'
          from pathlib import Path

          from larrak2.adapters.docker_openfoam import DockerOpenFoam, DockerOpenFoamConfig

          repo = Path.cwd()
          cfg = DockerOpenFoamConfig()
          DockerOpenFoam(cfg).ensure_custom_solver(
              source_dir=repo / "openfoam_custom_solvers" / "larrakEngineFoam",
              solver_name="larrakEngineFoam",
              cache_root=cfg.custom_solver_cache_root,
              refresh=True,
          )
          PY
