name: Reusable Fast Checks

on:
  workflow_call:
    inputs:
      workflow_name:
        required: true
        type: string
      pytest_args:
        required: false
        type: string
        default: "pytest -q"
      mypy_paths:
        required: false
        type: string
        default: "src/larrak2"
      ruff_paths:
        required: false
        type: string
        default: "src/larrak2"

permissions:
  contents: read

jobs:
  fast:
    name: Fast Checks (${{ inputs.workflow_name }})
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml', 'setup.cfg') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff format check
        run: ruff format --check ${{ inputs.ruff_paths }}
      - name: Ruff lint
        run: ruff check ${{ inputs.ruff_paths }}
      - name: Mypy
        env:
          PYTHONPATH: src
        run: mypy ${{ inputs.mypy_paths }}
      - name: Pytest
        env:
          PYTHONPATH: src
        run: ${{ inputs.pytest_args }}
