name: CEM Orchestration CI

on:
  push:
    branches:
      - dev/cem-orchestration
      - "codex/cem-orchestration/**"
    paths:
      - ".github/workflows/reusable-fast.yml"
      - ".github/workflows/cem-orchestration.yml"
      - "src/larrak2/architecture/**"
      - "src/larrak2/analysis/telemetry.py"
      - "src/larrak2/cem/**"
      - "src/larrak2/realworld/**"
      - "src/larrak2/orchestration/**"
      - "src/larrak2/optimization/production_gate.py"
      - "src/larrak2/optimization/workflow_report.py"
      - "tests/ci/test_cem_modules.py"
      - "tests/ci/test_orchestration_adapters_smoke.py"
      - "tests/ci/test_realworld_analysis_reuse.py"
      - "tests/ci/test_simulation_input_providers.py"
      - "tests/ci/test_workflow_contracts.py"
      - "tests/ci/test_workflow_ci_layout.py"
  pull_request:
    branches: [dev/cem-orchestration]
    paths:
      - ".github/workflows/reusable-fast.yml"
      - ".github/workflows/cem-orchestration.yml"
      - "src/larrak2/architecture/**"
      - "src/larrak2/analysis/telemetry.py"
      - "src/larrak2/cem/**"
      - "src/larrak2/realworld/**"
      - "src/larrak2/orchestration/**"
      - "src/larrak2/optimization/production_gate.py"
      - "src/larrak2/optimization/workflow_report.py"
      - "tests/ci/test_cem_modules.py"
      - "tests/ci/test_orchestration_adapters_smoke.py"
      - "tests/ci/test_realworld_analysis_reuse.py"
      - "tests/ci/test_simulation_input_providers.py"
      - "tests/ci/test_workflow_contracts.py"
      - "tests/ci/test_workflow_ci_layout.py"
  workflow_dispatch:
    inputs:
      run_heavy:
        description: "Run the self-hosted CEM/orchestration stub"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  fast:
    uses: ./.github/workflows/reusable-fast.yml
    with:
      workflow_name: cem-orchestration
      pytest_args: "pytest -q"
      mypy_paths: "src/larrak2/architecture/workflow_contracts.py src/larrak2/orchestration/simulation_inputs.py src/larrak2/analysis/telemetry.py"
      ruff_paths: "src/larrak2/cem src/larrak2/realworld src/larrak2/orchestration src/larrak2/architecture tests/ci/test_cem_modules.py tests/ci/test_orchestration_adapters_smoke.py tests/ci/test_realworld_analysis_reuse.py tests/ci/test_simulation_input_providers.py tests/ci/test_workflow_contracts.py tests/ci/test_workflow_ci_layout.py tests/ci/test_agent_docs.py"

  heavy-self-hosted:
    if: ${{ (github.event_name == 'workflow_dispatch' && inputs.run_heavy) || vars.LARRAK_ENABLE_SELF_HOSTED_CEM_ORCHESTRATION == 'true' }}
    runs-on: [self-hosted, larrak-placeholder, cem-orchestration]
    steps:
      - name: Download simulation dataset bundle (if available)
        uses: actions/download-artifact@v4
        with:
          name: simulation-dataset-bundle
          path: .
        continue-on-error: true
      - run: python src/larrak2/cli/run.py orchestrate --outdir outputs/orchestrate-cem --rpm 2200 --torque 120 --truth-dispatch-mode auto
