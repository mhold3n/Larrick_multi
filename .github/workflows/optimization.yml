name: Optimization CI

on:
  push:
    branches:
      - dev/optimization
      - "codex/optimization/**"
    paths:
      - ".github/workflows/reusable-fast.yml"
      - ".github/workflows/optimization.yml"
      - "src/larrak2/architecture/**"
      - "src/larrak2/analysis/telemetry.py"
      - "src/larrak2/optimization/**"
      - "src/larrak2/promote/**"
      - "src/larrak2/cli/run.py"
      - "src/larrak2/cli/run_workflows.py"
      - "src/larrak2/orchestration/simulation_inputs.py"
      - "tests/ci/test_orchestrate_cli_smoke.py"
      - "tests/ci/test_simulation_input_providers.py"
      - "tests/ci/test_workflow_contracts.py"
      - "tests/ci/test_workflow_ci_layout.py"
  pull_request:
    branches: [dev/optimization]
    paths:
      - ".github/workflows/reusable-fast.yml"
      - ".github/workflows/optimization.yml"
      - "src/larrak2/architecture/**"
      - "src/larrak2/analysis/telemetry.py"
      - "src/larrak2/optimization/**"
      - "src/larrak2/promote/**"
      - "src/larrak2/cli/run.py"
      - "src/larrak2/cli/run_workflows.py"
      - "src/larrak2/orchestration/simulation_inputs.py"
      - "tests/ci/test_orchestrate_cli_smoke.py"
      - "tests/ci/test_simulation_input_providers.py"
      - "tests/ci/test_workflow_contracts.py"
      - "tests/ci/test_workflow_ci_layout.py"
  workflow_dispatch:
    inputs:
      run_heavy:
        description: "Run the self-hosted optimization stub"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  fast:
    uses: ./.github/workflows/reusable-fast.yml
    with:
      workflow_name: optimization
      pytest_args: "pytest -q"
      mypy_paths: "src/larrak2/architecture/workflow_contracts.py src/larrak2/orchestration/simulation_inputs.py src/larrak2/analysis/telemetry.py src/larrak2/cli/run.py"
      ruff_paths: "src/larrak2/optimization src/larrak2/promote src/larrak2/cli/run.py src/larrak2/cli/run_workflows.py src/larrak2/orchestration/simulation_inputs.py src/larrak2/architecture tests/ci/test_orchestrate_cli_smoke.py tests/ci/test_simulation_input_providers.py tests/ci/test_workflow_contracts.py tests/ci/test_workflow_ci_layout.py tests/ci/test_agent_docs.py"

  heavy-self-hosted:
    if: ${{ (github.event_name == 'workflow_dispatch' && inputs.run_heavy) || vars.LARRAK_ENABLE_SELF_HOSTED_OPTIMIZATION == 'true' }}
    runs-on: [self-hosted, larrak-placeholder, optimization]
    steps:
      - run: echo "Optimization self-hosted runner stub. Replace with local hardware execution when available."
