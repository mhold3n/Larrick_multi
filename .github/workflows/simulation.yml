name: Simulation CI

on:
  push:
    branches:
      - dev/simulation
      - "codex/simulation/**"
    paths:
      - ".github/workflows/reusable-fast.yml"
      - ".github/workflows/simulation.yml"
      - "src/larrak2/architecture/**"
      - "src/larrak2/analysis/telemetry.py"
      - "src/larrak2/simulation_validation/**"
      - "src/larrak2/pipelines/openfoam.py"
      - "src/larrak2/adapters/openfoam.py"
      - "src/larrak2/adapters/docker_openfoam.py"
      - "openfoam_custom_solvers/**"
      - "openfoam_templates/**"
      - "mechanisms/openfoam/**"
      - "tools/rebuild_calculix_case_replay_dataset.py"
      - "tests/ci/test_validate_simulation_cli_cache.py"
      - "tests/ci/test_workflow_contracts.py"
      - "tests/ci/test_workflow_ci_layout.py"
  pull_request:
    branches: [dev/simulation]
    paths:
      - ".github/workflows/reusable-fast.yml"
      - ".github/workflows/simulation.yml"
      - "src/larrak2/architecture/**"
      - "src/larrak2/analysis/telemetry.py"
      - "src/larrak2/simulation_validation/**"
      - "src/larrak2/pipelines/openfoam.py"
      - "src/larrak2/adapters/openfoam.py"
      - "src/larrak2/adapters/docker_openfoam.py"
      - "openfoam_custom_solvers/**"
      - "openfoam_templates/**"
      - "mechanisms/openfoam/**"
      - "tools/rebuild_calculix_case_replay_dataset.py"
      - "tests/ci/test_validate_simulation_cli_cache.py"
      - "tests/ci/test_workflow_contracts.py"
      - "tests/ci/test_workflow_ci_layout.py"
  workflow_dispatch:
    inputs:
      run_heavy:
        description: "Run the self-hosted heavy simulation stub"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  fast:
    uses: ./.github/workflows/reusable-fast.yml
    with:
      workflow_name: simulation
      pytest_args: "pytest -q"
      mypy_paths: "src/larrak2/architecture/workflow_contracts.py src/larrak2/analysis/telemetry.py"
      ruff_paths: "src/larrak2/simulation_validation src/larrak2/pipelines/openfoam.py src/larrak2/adapters/openfoam.py src/larrak2/adapters/docker_openfoam.py src/larrak2/architecture tests/ci/test_validate_simulation_cli_cache.py tests/ci/test_workflow_contracts.py tests/ci/test_workflow_ci_layout.py tests/ci/test_agent_docs.py"

  heavy-self-hosted:
    if: ${{ (github.event_name == 'workflow_dispatch' && inputs.run_heavy) || vars.LARRAK_ENABLE_SELF_HOSTED_SIMULATION == 'true' }}
    runs-on: [self-hosted, larrak-placeholder, simulation]
    steps:
      - run: echo "Simulation self-hosted runner stub. Replace with local hardware execution when available."
      - name: Upload simulation dataset bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: simulation-dataset-bundle
          path: simulation_dataset_bundle.json
          if-no-files-found: ignore
          retention-days: 7
