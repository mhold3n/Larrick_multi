name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fast-checks:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml', 'requirements-external.txt', 'scripts/install_external_larrak.sh') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      - name: Configure Git for private LarrickCamPro dependencies
        env:
          PAT: ${{ secrets.LARRICKCAMPRO_GIT_READ_PAT }}
        run: |
          if [ -z "${PAT}" ]; then
            echo "::error::Missing repository secret LARRICKCAMPRO_GIT_READ_PAT (PAT with Contents: Read on private LarrickCamPro/larrak-* repos). Required for pip to clone pinned git dependencies."
            exit 1
          fi
          git config --global url."https://x-access-token:${PAT}@github.com/LarrickCamPro/".insteadOf "https://github.com/LarrickCamPro/"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          bash scripts/install_external_larrak.sh
          pip install -e ".[dev]" --no-deps
      - name: Ruff format check
        run: ruff format --check src tests scripts
      - name: Ruff lint
        run: ruff check src tests scripts
      - name: Mypy
        env:
          PYTHONPATH: src
          LARRICK_MULTI_ROOT: ${{ github.workspace }}
        run: >
          mypy
          src/larrak2/architecture/workflow_contracts.py
          src/larrak2/cli/run.py
          src/larrak2/cli/train.py
      - name: Pytest
        env:
          PYTHONPATH: src
          LARRICK_MULTI_ROOT: ${{ github.workspace }}
        run: pytest -q
