name: Training CI

on:
  push:
    branches:
      - dev/training
      - "codex/training/**"
    paths:
      - ".github/workflows/reusable-fast.yml"
      - ".github/workflows/training.yml"
      - "src/larrak2/architecture/**"
      - "src/larrak2/analysis/telemetry.py"
      - "src/larrak2/training/**"
      - "src/larrak2/surrogate/**"
      - "src/larrak2/cli/train.py"
      - "tests/ci/test_train_cli_validation_gate.py"
      - "tests/ci/test_training_quality_report_emission.py"
      - "tests/ci/test_training_manifest_ingestion.py"
      - "tests/ci/test_workflow_contracts.py"
      - "tests/ci/test_workflow_ci_layout.py"
  pull_request:
    branches: [dev/training]
    paths:
      - ".github/workflows/reusable-fast.yml"
      - ".github/workflows/training.yml"
      - "src/larrak2/architecture/**"
      - "src/larrak2/analysis/telemetry.py"
      - "src/larrak2/training/**"
      - "src/larrak2/surrogate/**"
      - "src/larrak2/cli/train.py"
      - "tests/ci/test_train_cli_validation_gate.py"
      - "tests/ci/test_training_quality_report_emission.py"
      - "tests/ci/test_training_manifest_ingestion.py"
      - "tests/ci/test_workflow_contracts.py"
      - "tests/ci/test_workflow_ci_layout.py"
  workflow_dispatch:
    inputs:
      run_heavy:
        description: "Run the self-hosted heavy training stub"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  fast:
    uses: ./.github/workflows/reusable-fast.yml
    with:
      workflow_name: training
      pytest_args: "pytest -q"
      mypy_paths: "src/larrak2/architecture/workflow_contracts.py src/larrak2/analysis/telemetry.py src/larrak2/cli/train.py"
      ruff_paths: "src/larrak2/training src/larrak2/surrogate src/larrak2/cli/train.py src/larrak2/architecture tests/ci/test_train_cli_validation_gate.py tests/ci/test_training_quality_report_emission.py tests/ci/test_training_manifest_ingestion.py tests/ci/test_workflow_contracts.py tests/ci/test_workflow_ci_layout.py tests/ci/test_agent_docs.py"

  heavy-self-hosted:
    if: ${{ (github.event_name == 'workflow_dispatch' && inputs.run_heavy) || vars.LARRAK_ENABLE_SELF_HOSTED_TRAINING == 'true' }}
    runs-on: [self-hosted, larrak-placeholder, training]
    steps:
      - name: Download simulation dataset bundle (if available)
        uses: actions/download-artifact@v4
        with:
          name: simulation-dataset-bundle
          path: .
        continue-on-error: true
      - run: echo "Training self-hosted runner stub. Replace with local hardware execution when available."
