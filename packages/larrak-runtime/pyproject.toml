[project]
name = "larrak-runtime"
version = "0.1.0"
description = "Shared runtime package for Larrak optimization evaluation"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "joblib>=1.3",
    "numpy>=1.24",
    "numpy-stl>=3.0",
    "pydantic>=2.0",
    "pyyaml>=6.0",
    "scikit-learn>=1.0",
    "torch>=2.0",
]

[project.optional-dependencies]
casadi = ["casadi>=3.6"]
combustion = ["cantera>=3.0"]

[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.package-dir]
"" = "../../src"

[tool.setuptools.packages.find]
where = ["../../src"]
include = ["larrak_runtime*"]
