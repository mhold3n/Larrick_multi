# CamProV5 Desktop Application Test Configuration

# Test Execution Settings
test.execution.timeout=30
test.execution.parallel=true
test.execution.retry.count=3
test.execution.retry.delay=1000

# Performance Test Settings
performance.startup.timeout=5000
performance.ui.response.timeout=100
performance.result.display.timeout=1000
performance.memory.limit.mb=200
performance.animation.timeout=500

# Integration Test Settings
integration.test.output.dir=./test_output
integration.test.cleanup=true
integration.test.isolation=true

# User Acceptance Test Settings
acceptance.test.timeout=30
acceptance.test.interaction.delay=100
acceptance.test.verification.timeout=5000

# Pipeline Test Settings
pipeline.test.timeout=30
pipeline.test.consistency.runs=3
pipeline.test.edge.case.enabled=true

# Test Data Settings
test.data.default.parameters=true
test.data.quick.test.parameters=true
test.data.high.performance.parameters=true
test.data.edge.case.parameters=true
test.data.invalid.parameters=true

# Logging Settings
test.logging.level=INFO
test.logging.console=true
test.logging.file=true
test.logging.file.path=./test_logs

# Report Settings
test.report.generate=true
test.report.format=markdown
test.report.output.path=./test_reports
test.report.include.details=true
test.report.include.performance=true

# Accessibility Test Settings
accessibility.test.enabled=true
accessibility.test.high.contrast=true
accessibility.test.large.text=true
accessibility.test.screen.reader=true
accessibility.test.keyboard.navigation=true

# Error Handling Test Settings
error.test.invalid.parameters=true
error.test.network.failure=false
error.test.file.system.error=true
error.test.memory.exhaustion=false

# Mock Settings
mock.bridge.enabled=false
mock.performance.enabled=false
mock.accessibility.enabled=false
mock.error.handler.enabled=false

# Environment Settings
test.environment=integration
test.platform=desktop
test.ui.framework=compose
test.state.management=stateflow

# Validation Settings
validation.parameter.range=true
validation.result.consistency=true
validation.performance.metrics=true
validation.user.experience=true

# Cleanup Settings
cleanup.test.files=true
cleanup.temp.directories=true
cleanup.log.files=true
cleanup.report.files=false
